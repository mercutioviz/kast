# Clean scan scenario — target with no High/Medium/Low issues, only Informational.
# Verifies the prompt handles the "nothing significant found" case gracefully
# (says so plainly, doesn't hallucinate issues, doesn't sound dismissive).
name: clean_scan
report_data:
  target: cleanapp.example.com
  all_issues:
    - id: ORG-DISC-001
      display_name: "Organization Infrastructure Disclosure"
      severity: Informational
      category: "Information Disclosure"
      reported_by: org_discovery
      description: >
        Passive reconnaissance revealed standard DNS and certificate records.
        No sensitive internal hostnames or IP ranges exposed beyond what is
        typical for a public-facing application.
  scan_metadata:
    total_issues: 1
    severity_counts:
      High: 0
      Medium: 0
      Low: 0
      Informational: 1
      Unknown: 0
    waf_statistics:
      total_issues: 1
      waf_addressable_count: 0
      waf_addressable_percentage: 0.0
      non_waf_count: 1
      high_severity_waf: 0
      medium_severity_waf: 0
      low_severity_waf: 0
  plugin_executive_summaries:
    - plugin_name: testssl
      summary: "TLS configuration is strong. TLS 1.3 and 1.2 only; no legacy protocols or weak ciphers detected."
    - plugin_name: whatweb
      summary: "Modern technology stack detected. Security headers (HSTS, X-Frame-Options, CSP) are present."
    - plugin_name: org_discovery
      summary: "Standard public DNS and certificate records enumerated. No unusual exposure found."
