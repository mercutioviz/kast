# OWASP ZAP Automation Framework Plan - STANDARD Profile
# Balanced scan for regular security assessments.
# Spider type is injected at runtime via --set zap.spider_type=traditional|ajax|client
# Estimated duration: ~45-60 minutes

env:
  contexts:
    - name: "target-context"
      urls:
        - "${TARGET_URL}"
      includePaths:
        - "${TARGET_URL}.*"
      excludePaths:
        - ".*logout.*"
        - ".*signout.*"
  parameters:
    failOnError: true
    failOnWarning: false
    progressToStdout: true

jobs:
  # Spider — depth and duration doubled vs quick; type injected at runtime
  - type: "spider"
    parameters:
      context: "target-context"
      maxDuration: 10
      maxDepth: 10
      maxChildren: 0
      acceptCookies: true
      handleODataParametersVisited: false
      parseComments: true
      parseGit: false
      parseRobotsTxt: true
      parseSitemapXml: true
      parseSVNEntries: false
      postForm: true
      processForm: true
      requestWaitTime: 200
      sendRefererHeader: true
      threadCount: 4

  # Passive scan configuration — more alerts per rule than quick
  - type: "passiveScan-config"
    parameters:
      maxAlertsPerRule: 10
      scanOnlyInScope: true
      enableTags: false

  # Wait for passive scan to complete
  - type: "passiveScan-wait"
    parameters:
      maxDuration: 10

  # Active scan — longer per-rule and total budget, query params enabled
  - type: "activeScan"
    parameters:
      context: "target-context"
      policy: "Default Policy"
      maxRuleDurationInMins: 10
      maxScanDurationInMins: 45
      addQueryParam: true
      delayInMs: 0
      handleAntiCSRFTokens: true
      injectPluginIdInHeader: false
      scanHeadersAllRequests: true
      threadPerHost: 4

  # Generate report
  - type: "report"
    parameters:
      template: "traditional-json"
      reportDir: "/tmp"
      reportFile: "zap_report.json"
      reportTitle: "KAST ZAP Standard Scan"
      reportDescription: "Standard security assessment scan"
      displayReport: false
